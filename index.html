<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金宝美食猎人 Pro</title>
    <style>
        body { font-family: sans-serif; background: #f1f2f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        #foodName { font-size: 1.8rem; color: #ff4757; font-weight: bold; margin: 20px 0; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        #foodTip { color: #747d8c; margin-bottom: 20px; min-height: 60px; font-size: 0.95rem; }
        .main-btn { width: 100%; padding: 15px; background: #ff4757; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.3s; }
        .main-btn:disabled { background: #ccc; cursor: not-allowed; }
        #dbStatus { font-size: 0.75rem; color: #2ecc71; margin-bottom: 10px; font-weight: bold; }
        
        .map-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #4285F4;
            color: white !important;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            box-shadow: 0 4px 10px rgba(66, 133, 244, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🍜 Kampar Hunter</h1>
    <div id="dbStatus">正在连接云端数据库...</div>
    <div id="foodName">准备好了吗？</div>
    <div id="foodTip">点击按钮开始抽奖</div>
    <button class="main-btn" id="pickBtn" onclick="startRolling()" disabled>帮我决定！</button>
</div>

<script>
    let foods = []; 
    const dataUrl = 'https://raw.githubusercontent.com/chinweibin-maker/kampar-food-hunter-v2/main/data.json?t=' + new Date().getTime(); 

    async function loadDatabase() { 
        try { 
            const response = await fetch(dataUrl); 
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const realFoods = await response.json(); 
            
            // 自动补齐 1000 条
            let fakeFoods = [];
            for (let i = realFoods.length + 1; i <= 1000; i++) {
                fakeFoods.push({
                    "name": `金宝隐藏美食 #${i}`,
                    "tip": `探索第 ${i} 号神秘美食！`
                });
            }
            foods = realFoods.concat(fakeFoods); 
            document.getElementById('dbStatus').innerText = `✅ 数据库就绪 (${foods.length} 家店)`; 
            document.getElementById('pickBtn').disabled = false;
        } catch (error) { 
            document.getElementById('dbStatus').innerText = `❌ 加载失败: ${error.message}`; 
            document.getElementById('foodTip').innerText = "请检查 data.json 格式或 GitHub 链接。";
        } 
    } 

    loadDatabase(); 

    function startRolling() { 
        const nameEl = document.getElementById('foodName'); 
        const tipEl = document.getElementById('foodTip'); 
        const btn = document.getElementById('pickBtn'); 
        
        // 1. 锁定按钮，清空旧 tip
        btn.disabled = true; 
        btn.innerText = "正在挑选...";
        tipEl.innerHTML = "正在全城搜索美食...";

        let count = 0; 
        const timer = setInterval(() => { 
            const randomTemp = foods[Math.floor(Math.random() * foods.length)]; 
            nameEl.innerText = randomTemp.name; 
            count++; 

            if (count > 25) { // 滚动 25 次后停止
                clearInterval(timer); 
                
                // 2. 确定最终美食
                const final = foods[Math.floor(Math.random() * foods.length)];
                nameEl.innerText = final.name;
                
                // 3. 生成导航链接
                const mapSearch = encodeURIComponent(final.name + " Kampar");
                const mapUrl = `https://www.google.com/maps/search/?api=1&query=${mapSearch}`;

                // 4. 显示 Tip 和导航按钮
                tipEl.innerHTML = `
                    <div>💡 ${final.tip}</div>
                    <a href="${mapUrl}" target="_blank" class="map-link">📍 开启导航</a>
                `;

                // 5. 恢复按钮
                btn.disabled = false;
                btn.innerText = "再抽一次";
            } 
        }, 60); 
    }
</script>

</body>
</html>
