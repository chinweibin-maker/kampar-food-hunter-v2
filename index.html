<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金宝美食猎人 Pro - 数据驱动版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #2f3542;
            --bg: #f1f2f6;
        }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .container { background: white; width: 90%; max-width: 450px; padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center; }
        
        h1 { color: var(--secondary); margin-bottom: 5px; font-size: 1.8rem; }
        .subtitle { color: #a1a1a1; font-size: 0.9rem; margin-bottom: 30px; }

        /* 数据库管理区 */
        .db-panel { background: #f9f9f9; border: 2px dashed #ddd; padding: 15px; border-radius: 12px; margin-bottom: 20px; transition: 0.3s; }
        .db-panel:hover { border-color: var(--primary); }
        input[type="file"] { display: none; }
        .upload-label { cursor: pointer; color: var(--primary); font-weight: bold; font-size: 0.9rem; }

        /* 结果显示区 */
        .display-card { height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        #foodName { font-size: 2.2rem; font-weight: 800; color: var(--primary); margin: 0; transition: 0.3s; }
        #foodTip { color: #747d8c; font-size: 0.95rem; margin-top: 10px; padding: 0 20px; min-height: 1.2em; }

        /* 按钮 */
        .main-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--primary); color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3); transition: 0.2s; }
        .main-btn:active { transform: scale(0.98); }
        .main-btn:disabled { background: #ccc; box-shadow: none; }

        /* 统计 */
        .stats { margin-top: 15px; font-size: 0.8rem; color: #ced4da; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍜 Kampar Hunter</h1>
    <p class="subtitle">让数据决定你今天在金宝吃什么</p>

    <div class="display-card">
        <p id="foodName">准备好了吗？</p>
        <p id="foodTip">点击下方按钮，开启今日美食之旅</p>
    </div>

    <div class="db-panel">
        <label for="csvFile" class="upload-label">📁 点击上传你的美食 Excel (CSV)</label>
        <input type="file" id="csvFile" accept=".csv">
        <div class="stats" id="dbStatus">当前使用：默认数据库 (5家店)</div>
    </div>

    <button class="main-btn" id="pickBtn" onclick="startRolling()">帮我决定！</button>
    
    <p class="stats">💡 提示：Excel 第一列写店名，第二列写贴士</p>
</div>

<script>
    // 默认数据，防止用户没上传文件
    let foods = [
        { name: "老街瓦煲鸡饭", tip: "记得多加蛋，锅巴才是精华。" },
        { name: "金宝明记猪肠粉", tip: "咖喱酱绝了，早点去排队。" },
        { name: "新街 Nasi Lemak", tip: "虽然有点辣，但真的很爽。" },
        { name: "大树下酿豆腐", tip: "炸腐竹是必点项。" },
        { name: "西湖板面", tip: "配上炸江鱼仔简直完美。" }
    ];

    const nameEl = document.getElementById('foodName');
    const tipEl = document.getElementById('foodTip');
    const statusEl = document.getElementById('dbStatus');

    // 处理 CSV 上传
    document.getElementById('csvFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        Papa.parse(file, {
            skipEmptyLines: true,
            complete: function(results) {
                // 转换数据格式 [ ['店名', '贴士'], ... ] -> [ {name, tip}, ... ]
                foods = results.data.map(row => ({
                    name: row[0],
                    tip: row[1] || "这家店暂时没有秘密贴士哦~"
                }));
                statusEl.innerText = `✅ 已加载自定义数据库：${foods.length} 家店`;
                statusEl.style.color = "#2ed573";
            }
        });
    });

    // 滚动逻辑
    function startRolling() {
        const btn = document.getElementById('pickBtn');
        btn.disabled = true;
        let count = 0;
        
        // 模拟抽奖动画
        const timer = setInterval(() => {
            const randomTemp = foods[Math.floor(Math.random() * foods.length)];
            nameEl.innerText = randomTemp.name;
            nameEl.style.opacity = "0.5";
            count++;

            if (count > 15) {
                clearInterval(timer);
                const final = foods[Math.floor(Math.random() * foods.length)];
                nameEl.innerText = final.name;
                nameEl.style.opacity = "1";
                tipEl.innerText = "💡 " + final.tip;
                btn.disabled = false;
            }
        }, 80);
    }
</script>

</body>
</html>
